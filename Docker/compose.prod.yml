networks:
  totem_network_static:
    driver: bridge
services:
  backend:
    container_name: totem_backend
    build:
      context: ../Backend/apis
      dockerfile: ../../Docker/Backend/dockerfile
    environment:
      NODE_ENV: production
      ELASTIC_NODE: http://database:9200
      # Si usas seguridad en ES, habilita una de estas:
      # ELASTIC_API_KEY: ${ELASTIC_API_KEY}
      # ELASTIC_API_KEY_ID: ${ELASTIC_API_KEY_ID}
      # ELASTIC_API_KEY_VALUE: "MldLSUxKa0I4dk5pN0lhZjZDMUI6VGpBVG1CUXFRcENHbVJyRVFlZE1Mdw=="
      ELASTIC_USERNAME: elastic
      ELASTIC_PASSWORD: test123
      JWT_SECRET: "[AhlwV-b-'FsyuY*b//3xa@TS!ixV6[}V-S=*A/]Ye0It"
      SYNCRONIZER_JWT_SECRET: "SrepA1Kjq1fZlU6McI4p7Y5IVF0t7Wpyeff3qo2DaPsqJ4Kxpc6FmBpE9I3Q1VsB"
      MONGODB_URL: "mongodb://admin:test123@database_mongo:27017/totem_admins?authSource=admin&replicaSet=rs0"

    ports:
      - "4004:4004"
    networks:
      - totem_network_static
    restart: unless-stopped
  
  database_mongo:
    image: mongo:7.0  #mongo:4.4 para servidor viejo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: test123
      MONGO_INITDB_DATABASE: totem_admins
    ports:
      - "27017:27017"
    volumes:
      - ./Database/backup/mongo_data:/data/db
      - ./Database/backup/mongo_keyfile:/data/keyfile:ro
      - ./Database/backup/mongo_init:/docker-entrypoint-initdb.d:ro
    networks:
      - totem_network_static
    restart: unless-stopped
    entrypoint:  ## solo version mongo superior a 4.4
      - bash
      - -c
      - |
        openssl rand -base64 756 > /data/mongodb-keyfile
        chmod 400 /data/mongodb-keyfile
        chown 999:999 /data/mongodb-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/mongodb-keyfile

  frontend:
    build:
      context: ../Frontend
      dockerfile: ../Docker/Frontend/dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_BUILD_MODE: "true"
    ports:
      - "3004:3004"
    networks:
      - totem_network_static
    depends_on: [ backend ]
    restart: unless-stopped

  frontend_admin:
    build:
      context: ../FrontendAdmin
      dockerfile: ../Docker/FrontendAdmin/dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_BUILD_MODE: "true"
    ports:
      - "6004:6004"
    networks:
      - totem_network_static
    depends_on: [ backend ]
    restart: unless-stopped

  synchronizer:
    build:
      # Use the repository's real source folder as build context so the
      # synchronizer script is included in the image.
      context: ../Backend/synchronizer
      dockerfile: ../../Docker/Backend/synchronizer/dockerfile
    image: totem-synchronizer:latest
    environment:
      # Override with specific backend container name if needed
      API_AUTH_URL: "http://totem_backend:4004/api/admin/administrar/practicas/syncronizer/auth"
      API_UPLOAD_URL: "http://totem_backend:4004/api/admin/administrar/practicas/syncronizer"
    env_file:
      - ../Backend/synchronizer/.env
    volumes:
      # Persist the last fetch state on the host
      - ./Backend/synchronizer/.last_fetch.json:/app/.last_fetch.json
      # Optional: mount service account creds if present (uncomment when available)
      # - ../Backend/syncronizer/creds/service-account.json:/app/creds/service-account.json:ro
    restart: unless-stopped
    networks:
      - totem_network_static
    depends_on:
      - backend

volumes:
  esdata:

